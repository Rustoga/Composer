<style>
:root { --charcoal: #1a1a1f; --accent: #0ea5e9; --text: #f1f5f9; }
* { scrollbar-width: thin; scrollbar-color: #3d3d48 var(--charcoal); }
body { background: linear-gradient(135deg, var(--charcoal) 0%, #12121a 50%, var(--charcoal) 100%); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
.font-brand { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 0.2em; }
.section-badge { font-size: 9px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
.card { background: linear-gradient(135deg, rgba(45,45,53,0.6) 0%, rgba(45,45,53,0.3) 100%); border: 1px solid rgba(61,61,72,0.5); border-radius: 2px; }
.card:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(14,165,233,0.25); }
@keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.6s ease forwards; }
@media (prefers-reduced-motion: reduce) { .animate-in { animation: none; opacity: 1; transform: none; } }
audio, video { background: rgba(0,0,0,0.4); border-radius: 4px; width: 100%; }
audio::-webkit-media-controls-panel, video::-webkit-media-controls-panel { background: rgba(26,26,31,0.97); }
.mini-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; padding: 10px 12px; }
audio { outline: none; }
</style>
