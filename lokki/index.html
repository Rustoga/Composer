<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokki - Free Events Helsinki, Espoo, Vantaa</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>
  <h1>🎫 Lokki</h1>
  <p style="text-align:center;">Free events in Helsinki, Espoo & Vantaa</p>

  <div id="status" style="text-align:center;">Loading...</div>
  <div id="grid" class="grid"></div>

  <script>
    async function loadEvents() {
      try {
        const res = await fetch('/api/v2/events');
        const data = await res.json();

        const events = data.events || [];

        document.getElementById("status").innerText =
          `Loaded ${events.length} events`;

        const grid = document.getElementById("grid");

        grid.innerHTML = events.map(e => `
          <div class="card">
            <div class="title">${e.title}</div>
            <div class="meta">📍 ${e.location}</div>
            <div class="meta">📅 ${e.date}</div>
            <div class="meta">🏷️ ${e.category}</div>
            <div class="meta">🔗 ${e.source}</div>
            <a href="${e.url || '#'}" target="_blank">View</a>
          </div>
        `).join("");

      } catch (err) {
        document.getElementById("status").innerText =
          "Failed to load events API";
        console.error(err);
      }
    }

    loadEvents();
  </script>
</body>
</html>
