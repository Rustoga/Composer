<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokki - Helsinki Free Events</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #0f172a;
            color: #e2e8f0;
        }

        h1 {
            color: #60a5fa;
        }

        .event {
            background: #1e293b;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .error {
            color: #fca5a5;
            background: #3f1d1d;
            padding: 10px;
            border-radius: 6px;
        }

        .loading {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <h1>Lokki</h1>
    <p>A place to discover free events happening in Helsinki, Espoo, and Vantaa.</p>

    <div id="status" class="loading">Loading events...</div>
    <div id="events"></div>

    <script>
        async function loadEvents() {
            const status = document.getElementById('status');
            const container = document.getElementById('events');

            try {
                const res = await fetch('/api/v2/events');

                if (!res.ok) {
                    throw new Error('API error: ' + res.status);
                }

                const data = await res.json();

                if (!data.events || !Array.isArray(data.events)) {
                    throw new Error('Invalid API response');
                }

                status.style.display = 'none';

                container.innerHTML = data.events.map(e => `
                    <div class="event">
                        <strong>${escapeHtml(e.title || '')}</strong><br>
                        📍 ${e.location || 'Unknown'}<br>
                        📅 ${e.date || 'TBA'}<br>
                        🔗 <a href="${e.url || '#'}" target="_blank" style="color:#60a5fa;">
                            View
                        </a>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);

                status.className = 'error';
                status.textContent = 'Failed to load events: ' + err.message;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadEvents();
    </script>
</body>
</html>
