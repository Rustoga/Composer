<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lokki - Free Events Helsinki</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .event {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        .meta {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            opacity: 0.7;
        }

        .error {
            color: #f87171;
            text-align: center;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            background: #334155;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #475569;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🎫 Lokki Events</h1>

    <div class="controls">
        <button onclick="loadEvents()">Refresh</button>
    </div>

    <div id="status" class="loading">Loading events...</div>
    <div id="events"></div>
</div>

<script>
    async function loadEvents() {
        const status = document.getElementById("status");
        const container = document.getElementById("events");

        status.textContent = "Loading events...";
        container.innerHTML = "";

        try {
            const res = await fetch("/api/v2/events");

            if (!res.ok) {
                throw new Error("API error: " + res.status);
            }

            const data = await res.json();

            const events = data.events || [];

            if (events.length === 0) {
                status.textContent = "No events found";
                return;
            }

            status.textContent = `Found ${events.length} events`;

            container.innerHTML = events.map(e => `
                <div class="event">
                    <div class="title">${escapeHtml(e.title || "No title")}</div>
                    <div class="meta">📍 ${e.location || "Unknown"}</div>
                    <div class="meta">📅 ${e.date || "No date"}</div>
                    <div class="meta">🏷 ${e.category || "OTHER"}</div>
                    <div class="meta">🔗 ${e.source || ""}</div>
                </div>
            `).join("");

        } catch (err) {
            status.textContent = "Error loading events";
            document.getElementById("events").innerHTML =
                `<div class="error">${err.message}</div>`;
        }
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    loadEvents();
</script>
</body>
</html>
