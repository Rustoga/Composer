<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokki - Free Events Helsinki, Espoo, Vantaa</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    input {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      min-width: 220px;
    }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    button {
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.active {
      background: #60a5fa;
      color: #0f172a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
      position: relative;
    }

    .title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 2px 0;
    }

    .fav {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      opacity: 0.6;
    }

    .fav.active {
      opacity: 1;
    }

    .loading {
      text-align: center;
      margin-top: 40px;
      opacity: 0.7;
    }

    .empty {
      text-align: center;
      margin-top: 40px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <h1>🎫 Lokki</h1>

  <div class="topbar">
    <input id="search" placeholder="Search events..." />
  </div>

  <div class="filters" id="filters"></div>

  <div id="status" class="loading">Loading events...</div>
  <div id="grid" class="grid"></div>

  <script>
    let allEvents = [];
    let activeCategory = "ALL";
    let searchTerm = "";
    let favorites = JSON.parse(localStorage.getItem("lokki_favs") || "[]");

    async function loadEvents() {
      try {
        const res = await fetch('/api/v2/events');
        const data = await res.json();

        allEvents = data.events || [];

        buildFilters(allEvents);
        render();
      } catch (e) {
        document.getElementById("status").innerText = "Failed to load events";
      }
    }

    function buildFilters(events) {
      const cats = ["ALL", ...new Set(events.map(e => e.category))];

      document.getElementById("filters").innerHTML =
        cats.map(c =>
          `<button onclick="setCategory('${c}')">${c}</button>`
        ).join("");

      setActiveButtons();
    }

    function setCategory(c) {
      activeCategory = c;
      setActiveButtons();
      render();
    }

    function setActiveButtons() {
      document.querySelectorAll(".filters button").forEach(b => {
        b.classList.remove("active");
        if (b.textContent === activeCategory) b.classList.add("active");
      });
    }

    function toggleFav(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem("lokki_favs", JSON.stringify(favorites));
      render();
    }

    function getFiltered() {
      let e = [...allEvents];

      if (activeCategory !== "ALL") {
        e = e.filter(x => x.category === activeCategory);
      }

      if (searchTerm) {
        const s = searchTerm.toLowerCase();
        e = e.filter(x =>
          (x.title || "").toLowerCase().includes(s) ||
          (x.location || "").toLowerCase().includes(s)
        );
      }

      return e;
    }

    function render() {
      const events = getFiltered();

      if (!events.length) {
        document.getElementById("status").innerHTML =
          `<div class="empty">No events found</div>`;
        document.getElementById("grid").innerHTML = "";
        return;
      }

      document.getElementById("status").innerText =
        `Showing ${events.length} events`;

      document.getElementById("grid").innerHTML = events.map(e => `
        <div class="card">
          <div class="fav ${favorites.includes(e.id) ? "active" : ""}"
               onclick="toggleFav('${e.id}')">⭐</div>

          <div class="title">${e.title}</div>
          <div class="meta">📍 ${e.location}</div>
          <div class="meta">📅 ${e.date}</div>
          <div class="meta">🏷️ ${e.category}</div>
          <div class="meta">🔗 ${e.source}</div>

          <a href="${e.url || '#'}" target="_blank">View</a>
        </div>
      `).join("");
    }

    document.getElementById("search").addEventListener("input", (e) => {
      searchTerm = e.target.value;
      render();
    });

    loadEvents();
  </script>
</body>
</html>
