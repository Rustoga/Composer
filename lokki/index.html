<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokki - Free Events Helsinki, Espoo, Vantaa</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    input {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      min-width: 220px;
    }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    button {
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.active {
      background: #60a5fa;
      color: #0f172a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 2px 0;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <h1>🎫 Lokki</h1>

  <div class="topbar">
    <input id="search" placeholder="Search events..." />
  </div>

  <div class="tabs">
    <button onclick="setTimeFilter('ALL')" class="active">All</button>
    <button onclick="setTimeFilter('TODAY')">Today</button>
    <button onclick="setTimeFilter('WEEK')">This Week</button>
  </div>

  <div class="filters" id="filters"></div>

  <div id="status" style="text-align:center;">Loading...</div>
  <div id="grid" class="grid"></div>

  <script>
    let allEvents = [];
    let activeCategory = "ALL";
    let activeTime = "ALL";
    let searchTerm = "";

    async function loadEvents() {
      const res = await fetch('/api/v2/events');
      const data = await res.json();

      allEvents = data.events || [];

      buildFilters(allEvents);
      render();
    }

    function buildFilters(events) {
      const categories = ["ALL", ...new Set(events.map(e => e.category))];
      document.getElementById("filters").innerHTML =
        categories.map(c =>
          `<button onclick="setCategory('${c}')">${c}</button>`
        ).join("");

      setActiveButtons();
    }

    function setCategory(cat) {
      activeCategory = cat;
      setActiveButtons();
      render();
    }

    function setTimeFilter(t) {
      activeTime = t;
      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      event.target.classList.add("active");
      render();
    }

    function setActiveButtons() {
      document.querySelectorAll(".filters button").forEach(b => {
        b.classList.remove("active");
        if (b.textContent === activeCategory) b.classList.add("active");
      });
    }

    function isToday(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      return d.toDateString() === now.toDateString();
    }

    function isThisWeek(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();

      const weekFromNow = new Date();
      weekFromNow.setDate(now.getDate() + 7);

      return d >= now && d <= weekFromNow;
    }

    function formatDate(dateStr) {
      try {
        const d = new Date(dateStr);
        return d.toLocaleString("en-GB", {
          weekday: "short",
          day: "2-digit",
          month: "short",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return dateStr;
      }
    }

    function getFiltered() {
      let events = [...allEvents];

      if (activeCategory !== "ALL") {
        events = events.filter(e => e.category === activeCategory);
      }

      if (searchTerm) {
        const s = searchTerm.toLowerCase();
        events = events.filter(e =>
          (e.title || "").toLowerCase().includes(s) ||
          (e.location || "").toLowerCase().includes(s)
        );
      }

      if (activeTime === "TODAY") {
        events = events.filter(e => isToday(e.date));
      }

      if (activeTime === "WEEK") {
        events = events.filter(e => isThisWeek(e.date));
      }

      return events;
    }

    function render() {
      const events = getFiltered();

      document.getElementById("status").innerText =
        `Showing ${events.length} events`;

      document.getElementById("grid").innerHTML = events.map(e => `
        <div class="card">
          <div class="title">${e.title}</div>
          <div class="meta">📍 ${e.location}</div>
          <div class="meta">📅 ${formatDate(e.date)}</div>
          <div class="meta">🏷️ ${e.category}</div>
          <div class="meta">🔗 ${e.source}</div>
          <a href="${e.url || '#'}" target="_blank">View</a>
        </div>
      `).join("");
    }

    document.getElementById("search").addEventListener("input", (e) => {
      searchTerm = e.target.value;
      render();
    });

    loadEvents();
  </script>
</body>
</html>
