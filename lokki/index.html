<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokki - Free Events Helsinki, Espoo, Vantaa</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    button {
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button.active {
      background: #60a5fa;
      color: #0f172a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
    }

    .title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 0.85rem;
      opacity: 0.8;
      margin: 2px 0;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>
  <h1>🎫 Lokki</h1>
  <p style="text-align:center;">Free events in Helsinki, Espoo & Vantaa</p>

  <div class="filters" id="filters"></div>

  <div id="status" style="text-align:center;">Loading...</div>
  <div id="grid" class="grid"></div>

  <script>
    let allEvents = [];
    let activeFilter = "ALL";

    async function loadEvents() {
      const res = await fetch('/api/v2/events');
      const data = await res.json();

      allEvents = data.events || [];

      buildFilters(allEvents);
      render(allEvents);
    }

    function buildFilters(events) {
      const categories = ["ALL", ...new Set(events.map(e => e.category))];

      const container = document.getElementById("filters");

      container.innerHTML = categories.map(c =>
        `<button onclick="setFilter('${c}')">${c}</button>`
      ).join("");

      setActiveButton("ALL");
    }

    function setFilter(cat) {
      activeFilter = cat;
      setActiveButton(cat);

      if (cat === "ALL") {
        render(allEvents);
      } else {
        render(allEvents.filter(e => e.category === cat));
      }
    }

    function setActiveButton(cat) {
      document.querySelectorAll("button").forEach(b => {
        b.classList.remove("active");
        if (b.textContent === cat) b.classList.add("active");
      });
    }

    function render(events) {
      document.getElementById("status").innerText =
        `Showing ${events.length} events`;

      document.getElementById("grid").innerHTML = events.map(e => `
        <div class="card">
          <div class="title">${e.title}</div>
          <div class="meta">📍 ${e.location}</div>
          <div class="meta">📅 ${e.date}</div>
          <div class="meta">🏷️ ${e.category}</div>
          <div class="meta">🔗 ${e.source}</div>
          <a href="${e.url || '#'}" target="_blank">View</a>
        </div>
      `).join("");
    }

    loadEvents();
  </script>
</body>
</html>
